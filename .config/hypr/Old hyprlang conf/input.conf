### Input

input {
	kb_layout = pl
	kb_variant =
	kb_model =
	kb_options =
	kb_rules =

	follow_mouse = 2 # disabled, if 1 moving mouse switch focused window
	float_switch_override_focus = 0 # when floating window is active mouse won't change focus when mowing out of it

	sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

	touchpad {
		natural_scroll = true
	}
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# changing workspaces with swipes
gesture = 3, horizontal, workspace
gesture = 3, down, mod: SUPER, close
gesture = 2, pinch, resize
gesture = 3, horizontal, mod: SUPER, move

# Per-device config, https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs
device {
	name = epic-mouse-v1
	sensitivity = -0.5
}
